name: Build Maher Focus APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Télécharger le code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Installer Android SDK
        uses: android-actions/setup-android@v3

      - name: Installer Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Corriger fortement les imports Compose
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path("app/src/main/java")
          files = list(root.rglob("*.kt"))

          for file in files:
              text = file.read_text(encoding="utf-8")

              needs_layout = any(word in text for word in [
                  "Column(", "Row(", "Spacer(", "Box(", "LazyColumn("
              ])

              if not needs_layout:
                  continue

              if "import androidx.compose.foundation.layout.*" in text:
                  continue

              # Supprime les imports layout incomplets pour éviter les doublons inutiles
              text = re.sub(
                  r"import androidx\.compose\.foundation\.layout\.Column\s*\n",
                  "",
                  text
              )

              # Ajoute l'import juste après la ligne package, même avec Windows CRLF
              text = re.sub(
                  r"(package\s+[^\r\n]+[\r\n]+)",
                  r"\1\nimport androidx.compose.foundation.layout.*\n",
                  text,
                  count=1
              )

              file.write_text(text, encoding="utf-8")
              print(f"Import layout ajouté dans {file}")

          PY

      - name: Vérifier les imports corrigés
        run: |
          grep -R "foundation.layout" app/src/main/java/com/maher/focus/ui/screens || true

      - name: Compiler l'APK debug
        run: gradle :app:assembleDebug --no-daemon

      - name: Publier l'APK téléchargeable
        uses: actions/upload-artifact@v4
        with:
          name: MaherFocus-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
